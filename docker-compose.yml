version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-prestacao-contas
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Add your Firebase environment variables here in Portainer
      # - VITE_FIREBASE_API_KEY=...
      # - VITE_FIREBASE_AUTH_DOMAIN=...
      # - VITE_FIREBASE_PROJECT_ID=...
      # - VITE_FIREBASE_STORAGE_BUCKET=...
      # - VITE_FIREBASE_MESSAGING_SENDER_ID=...
      # - VITE_FIREBASE_APP_ID=...
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
